name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy types-PyYAML
      - run: ruff check contrabin tests
      - run: ruff format --check contrabin tests
      - run: mypy contrabin --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Smoke test CLI
        run: contrabin --help
      - name: Run pytest
        run: pytest --cov=contrabin --cov-report=term-missing
