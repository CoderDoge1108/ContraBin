experiment_name: contrabin-finetune-summarization

data:
  dataset_name: anghabench-summarization
  train_path: data/anghabench/summ_train.jsonl
  val_path: data/anghabench/summ_val.jsonl
  test_path: data/anghabench/summ_test.jsonl
  source_max_length: 512
  binary_max_length: 512
  comment_max_length: 64

model:
  encoder_name: microsoft/graphcodebert-base
  hidden_dim: 768
  projection_dim: 256
  head_type: linear
  dropout: 0.1

optim:
  lr: 3.0e-5
  head_lr: 1.0e-3
  weight_decay: 1.0e-2
  warmup_steps: 500

training:
  batch_size: 16
  eval_batch_size: 32
  seed: 42
  mixed_precision: fp16
  output_dir: outputs/summarization
  curriculum:
    primary_epochs: 0
    linear_epochs: 0
    nonlinear_epochs: 10
