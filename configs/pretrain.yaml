experiment_name: contrabin-pretrain

data:
  dataset_name: anghabench-sample
  train_path: data/processed/train.jsonl
  val_path: data/processed/val.jsonl
  source_max_length: 512
  binary_max_length: 512
  comment_max_length: 64
  use_llm_comments: true
  num_workers: 4

model:
  encoder_name: microsoft/graphcodebert-base
  hidden_dim: 768
  projection_dim: 256
  head_type: linear
  dropout: 0.1
  temperature: 0.1
  stop_gradient_on_anchor: true

optim:
  lr: 1.0e-5
  head_lr: 1.0e-3
  weight_decay: 1.0e-3
  warmup_steps: 500
  max_grad_norm: 1.0
  scheduler: cosine

training:
  batch_size: 32
  eval_batch_size: 64
  seed: 42
  device: auto
  mixed_precision: no
  log_every_n_steps: 50
  eval_every_n_steps: 500
  output_dir: outputs/contrabin-pretrain
  curriculum:
    primary_epochs: 10
    linear_epochs: 5
    nonlinear_epochs: 5
